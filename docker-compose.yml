version: "3.8"

services:
  # ========== MySQL Database ==========
  db:
    image: mysql:8.0
    container_name: car_parts_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: car_parts_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # ========== Node.js API ==========
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: car_parts_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: car_parts_db
      JWT_SECRET: your_jwt_secret_key_change_this
      JWT_EXPIRES_IN: 24h
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USER: your_email@gmail.com
      MAIL_PASS: your_app_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql_data:
    driver: local

networks:
  app-network:
    driver: bridge
